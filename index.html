
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>For You ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --amber: #c8820e;
    --al: #e6a030;
    --ag: #f0c060;
    --cream: #f2e4c4;
    --cd: #c4af88;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── GRAIN OVERLAY ── */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 999; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 180px 180px;
    opacity: .4; mix-blend-mode: overlay;
    animation: grain .7s steps(1) infinite;
  }
  @keyframes grain {
    0%,100%{background-position:0 0}10%{background-position:-5% -10%}
    20%{background-position:-15% 5%}30%{background-position:7% -25%}
    40%{background-position:20% 25%}50%{background-position:-25% 10%}
    60%{background-position:15% 5%}70%{background-position:0 15%}
    80%{background-position:25% 35%}90%{background-position:-10% 10%}
  }

  /* ── STARS ── */
  #stars {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  }
  .star {
    position: absolute; background: #fff; border-radius: 50%;
    animation: twinkle linear infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%   { opacity: 0; transform: scale(0.5); }
    40%  { opacity: 1; transform: scale(1); }
    60%  { opacity: 0.6; transform: scale(1.2); }
    100% { opacity: 0; transform: scale(0.5); }
  }

  /* ── VIGNETTE ── */
  #vignette {
    position: fixed; inset: 0; z-index: 5; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.75) 100%);
  }

  /* ── MAIN WRAPPER ── */
  #wrapper {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
  }

  /* ── VIDEO CONTAINER ── */
  #video-wrap {
    position: relative;
    width: 100vw;
    flex: 1 1 auto;
    min-height: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    background: #000;
  }

  /* ── PROGRESS BAR ── */
  #progress-wrap {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: rgba(200,130,14,0.15);
    z-index: 20;
  }
  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, var(--amber), var(--ag));
    transition: width 0.4s linear;
    box-shadow: 0 0 8px rgba(200,130,14,0.6);
  }

  /* ── QUOTE AREA ── */
  #quote-area {
    flex: 0 0 auto;
    width: 100%;
    padding: 20px 32px 28px;
    text-align: center;
    position: relative;
    z-index: 20;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 60%, transparent 100%);
  }

  #quote-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(16px, 4vw, 26px);
    font-weight: 300;
    font-style: italic;
    color: var(--cream);
    line-height: 1.6;
    letter-spacing: 0.02em;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 1s ease, transform 1s ease;
    min-height: 2.4em;
    display: flex; align-items: center; justify-content: center;
  }

  #quote-text.visible {
    opacity: 1;
    transform: translateY(0);
  }

  #quote-author {
    margin-top: 10px;
    font-family: 'Caveat', cursive;
    font-size: clamp(13px, 3vw, 17px);
    color: var(--amber);
    letter-spacing: 0.08em;
    opacity: 0;
    transition: opacity 0.8s ease 0.4s;
  }
  #quote-author.visible { opacity: 1; }

  /* ── DECORATIVE DOTS ── */
  #quote-deco {
    display: flex; gap: 6px; justify-content: center; margin-top: 14px;
  }
  .deco-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--amber); opacity: 0.4;
    transition: opacity 0.3s;
  }
  .deco-dot.active { opacity: 1; background: var(--ag); }

  /* ── TOP LABEL ── */
  #top-label {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 20;
    display: flex; justify-content: center;
    padding: 18px 24px 0;
    pointer-events: none;
    opacity: 0;
    animation: fadeInDown 1.2s ease 0.5s forwards;
  }
  .top-label-inner {
    font-family: 'Caveat', cursive;
    font-size: clamp(14px, 3.5vw, 18px);
    color: var(--cd);
    letter-spacing: 0.15em;
  }
  .top-label-inner span { color: var(--amber); }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── TAP TO PLAY (iOS fallback UI) ── */
  #tap-overlay {
    position: absolute; inset: 0; z-index: 50;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.75);
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.5s;
    pointer-events: none;
  }
  #tap-overlay.show {
    opacity: 1;
    pointer-events: all;
  }
  .tap-icon {
    width: 64px; height: 64px;
    border: 2px solid var(--amber);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    color: var(--amber);
    margin-bottom: 14px;
    animation: pulse 2s ease infinite;
  }
  .tap-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--cd);
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(200,130,14,0.4); }
    50%      { box-shadow: 0 0 0 12px rgba(200,130,14,0); }
  }

  /* ── FADE OUT TRANSITION ── */
  #fade-cover {
    position: fixed; inset: 0; z-index: 9998;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.5s ease;
  }
  #fade-cover.active {
    opacity: 1;
    pointer-events: all;
  }

  /* small sparkle decoration */
  #sparkle-top {
    position: fixed; top: 0; left: 0; right: 0; height: 100%;
    z-index: 15; pointer-events: none; overflow: hidden;
  }
  .sp {
    position: absolute;
    color: var(--amber);
    font-size: 12px;
    opacity: 0;
    animation: spFloat linear infinite;
  }
  @keyframes spFloat {
    0%   { opacity: 0; transform: translateY(0) rotate(0deg); }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-120px) rotate(180deg); }
  }
</style>
</head>
<body>

<!-- Stars background -->
<div id="stars"></div>

<!-- Floating sparkles -->
<div id="sparkle-top"></div>

<!-- Vignette -->
<div id="vignette"></div>

<!-- Top label -->
<div id="top-label">
  <div class="top-label-inner">a little something <span>✦</span> made with love</div>
</div>

<!-- Main -->
<div id="wrapper">
  <div id="video-wrap">
    <video
      id="main-video"
      src="usvideo.mp4"
      autoplay
      muted
      playsinline
      webkit-playsinline
      preload="auto"
      disablepictureinpicture
      disableremoteplayback
    ></video>

    <!-- Progress bar -->
    <div id="progress-wrap">
      <div id="progress-bar"></div>
    </div>

    <!-- iOS tap overlay -->
    <div id="tap-overlay" onclick="userPlay()">
      <div class="tap-icon">▶</div>
      <div class="tap-text">Tap to begin</div>
    </div>
  </div>

  <!-- Quote -->
  <div id="quote-area">
    <div id="quote-text"></div>
    <div id="quote-author"></div>
    <div id="quote-deco"></div>
  </div>
</div>

<!-- Fade out cover -->
<div id="fade-cover"></div>

<script>
// ── QUOTES ────────────────────────────────────────────────────────
const quotes = [
  { text: "In the sweetness of friendship let there be laughter and sharing of pleasures.", author: "— Kahlil Gibran" },
  { text: "Friendship is the only cement that will ever hold the world together.", author: "— Woodrow Wilson" },
  { text: "A friend is one who knows you and loves you just the same.", author: "— Elbert Hubbard" },
  { text: "Some souls just understand each other upon meeting.", author: "— N.R. Hart" },
  { text: "These are the days we'll talk about when we're old and grey.", author: "— for you, always ✦" },
  { text: "Side by side or miles apart, real friends are always close to the heart.", author: "— unknown" },
  { text: "Not all treasure is silver and gold. Some of it is laughter and late nights.", author: "— ✦" },
  { text: "Every moment spent with you is a moment I'd choose again.", author: "— with love" },
];

let currentQuote = 0;
const quoteDuration = 5000; // ms per quote
let quoteTimer = null;

function buildDots() {
  const deco = document.getElementById('quote-deco');
  deco.innerHTML = '';
  quotes.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'deco-dot' + (i === 0 ? ' active' : '');
    deco.appendChild(d);
  });
}

function showQuote(idx) {
  const qt = document.getElementById('quote-text');
  const qa = document.getElementById('quote-author');
  const dots = document.querySelectorAll('.deco-dot');

  qt.classList.remove('visible');
  qa.classList.remove('visible');

  setTimeout(() => {
    qt.textContent = quotes[idx].text;
    qa.textContent = quotes[idx].author;
    qt.classList.add('visible');
    qa.classList.add('visible');
    dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  }, 400);
}

function startQuoteCycle() {
  buildDots();
  showQuote(0);
  quoteTimer = setInterval(() => {
    currentQuote = (currentQuote + 1) % quotes.length;
    showQuote(currentQuote);
  }, quoteDuration);
}

// ── STARS ─────────────────────────────────────────────────────────
function buildStars() {
  const container = document.getElementById('stars');
  const count = window.innerWidth < 500 ? 60 : 120;
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = 1 + Math.random() * 2.5;
    s.style.cssText = `
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      width: ${size}px;
      height: ${size}px;
      animation-duration: ${3 + Math.random() * 6}s;
      animation-delay: ${Math.random() * 8}s;
    `;
    container.appendChild(s);
  }
}

// ── SPARKLES ──────────────────────────────────────────────────────
function buildSparkles() {
  const container = document.getElementById('sparkle-top');
  const shapes = ['✦', '✧', '⋆', '·', '˚'];
  const count = 12;
  for (let i = 0; i < count; i++) {
    const sp = document.createElement('div');
    sp.className = 'sp';
    sp.textContent = shapes[Math.floor(Math.random() * shapes.length)];
    sp.style.cssText = `
      left: ${5 + Math.random() * 90}%;
      bottom: ${Math.random() * 30}%;
      font-size: ${8 + Math.random() * 10}px;
      color: ${['#c8820e','#e6a030','#f0c060','#f2e4c4'][Math.floor(Math.random()*4)]};
      animation-duration: ${6 + Math.random() * 8}s;
      animation-delay: ${Math.random() * 10}s;
    `;
    container.appendChild(sp);
  }
}

// ── VIDEO LOGIC ───────────────────────────────────────────────────
const video = document.getElementById('main-video');
const bar = document.getElementById('progress-bar');
const tapOverlay = document.getElementById('tap-overlay');
const fadeCover = document.getElementById('fade-cover');

function userPlay() {
  video.play().then(() => {
    tapOverlay.classList.remove('show');
  }).catch(() => {});
}

// Update progress bar
video.addEventListener('timeupdate', () => {
  if (video.duration) {
    bar.style.width = (video.currentTime / video.duration * 100) + '%';
  }
});

// When video ends → fade and redirect
video.addEventListener('ended', () => {
  clearInterval(quoteTimer);
  fadeCover.classList.add('active');
  setTimeout(() => {
    window.location.href = 'memories.html';
  }, 1600);
});

// Autoplay handling
video.addEventListener('canplaythrough', () => {
  const p = video.play();
  if (p !== undefined) {
    p.then(() => {
      tapOverlay.classList.remove('show');
    }).catch(() => {
      // Autoplay blocked (iOS strict) — show tap overlay
      tapOverlay.classList.add('show');
    });
  }
});

// Also try on load
window.addEventListener('load', () => {
  video.muted = true;
  const p = video.play();
  if (p !== undefined) {
    p.catch(() => {
      tapOverlay.classList.add('show');
    });
  }
});

// iOS: unlock audio context on first touch, then play
let unlocked = false;
document.addEventListener('touchstart', () => {
  if (!unlocked) {
    unlocked = true;
    video.muted = true;
    video.play().then(() => {
      tapOverlay.classList.remove('show');
    }).catch(() => {});
  }
}, { once: false, passive: true });

// Clicking anywhere plays if paused
document.addEventListener('click', () => {
  if (video.paused) {
    video.muted = true;
    video.play().catch(() => {});
  }
});

// ── INIT ──────────────────────────────────────────────────────────
buildStars();
buildSparkles();
startQuoteCycle();
</script>
</body>
</html>
